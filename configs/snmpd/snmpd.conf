# /etc/snmp/snmpd.conf — Captive Portal Gateway
# SNMPv3 only; community-based v1/v2c disabled.
#
# v3 user is created at deploy time by install/07-services.sh via net-snmp-create-v3-user.

# Listen on all interfaces; nftables filters who can reach 161.
agentAddress udp:161

# View definitions — system + interfaces + host resources
view systemonly included .1.3.6.1.2.1.1     # system
view systemonly included .1.3.6.1.2.1.2     # interfaces
view systemonly included .1.3.6.1.2.1.25    # host resources (CPU/mem/disk)
view systemonly included .1.3.6.1.4.1.2021  # ucd-snmp (load, mem)

# Bind v3 user "moxaadmin" to read access on the systemonly view.
# (User credentials are created out-of-band by net-snmp-create-v3-user.)
rouser moxaadmin authpriv -V systemonly

# System info
sysLocation    "Moxa Captive Portal Gateway"
sysContact     "admin@example.com"
sysServices    72
