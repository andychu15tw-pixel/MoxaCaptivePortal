# Captive Portal — CoovaChilli as RADIUS client
# Deployed to /etc/freeradius/3.0/clients.d/chilli.conf
#
# secret is rendered at deploy time from /etc/captive-portal/secrets.env

client chilli-localhost {
    ipaddr     = 127.0.0.1
    proto      = udp
    secret     = ${CHILLI_RADIUS_SECRET}
    require_message_authenticator = no
    nas_type   = other
    shortname  = chilli
}
