# /etc/rsyslog.d/30-captive-portal.conf
# Route service logs to dedicated files. Remote syslog forward configured
# separately at /etc/rsyslog.d/99-remote.conf (set via daloRADIUS UI / manually).

# CoovaChilli — local3 facility (matches `logfacility 3` in chilli.conf)
local3.*    /var/log/chilli.log
& stop

# nftables drops — kernel log via NETFILTER_LOG with our prefixes
:msg, contains, "[fw-"   /var/log/firewall.log
& stop
