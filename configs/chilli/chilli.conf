# /etc/chilli.conf — CoovaChilli main config
# Deployed by install/03-chilli.sh
# Variables ${VAR} substituted at deploy time.
#
# Reference: https://coova.github.io/CoovaChilli/

# --- Interfaces ---
dhcpif    ${LAN_IF}
tundev    tun0

# --- Network ---
net       192.168.182.0/24
uamlisten 192.168.182.1
uamport   3990

# --- DNS (advertised to clients via DHCP) ---
# Point clients at our local dnsmasq on tun0 (captive-dnsmasq.service).
# That dnsmasq forwards to upstream 8.8.8.8 / 1.1.1.1 from its own process.
dns1 192.168.182.1
dns2 192.168.182.1

# --- RADIUS ---
radiusserver1 127.0.0.1
radiusserver2 127.0.0.1
radiussecret  ${CHILLI_RADIUS_SECRET}
radiusnasid   moxa-cp-gw
radiusauthport 1812
radiusacctport 1813
acctupdate

# --- UAM (portal redirect target) ---
# Use HTTP (not HTTPS): OS captive-portal detection probes (Apple CNA, Android,
# Windows NCSI) issue HTTP GETs and follow plain redirects. A self-signed HTTPS
# redirect breaks auto-popup. Apache HTTP vhost (port 80) serves cgi-bin too.
uamserver  http://192.168.182.1/cgi-bin/hotspotlogin.cgi
uamhomepage http://192.168.182.1/
uamsecret  ${CHILLI_UAM_SECRET}
# uamallowed = walled garden (no auth needed). Only put portal-self here.
# DO NOT include OS captive-probe domains (captive.apple.com etc) — they MUST
# be intercepted by chilli so OS detects captive portal and pops up CNA window.
uamallowed 192.168.182.1

# --- Session defaults (overridable via RADIUS reply) ---
defsessiontimeout 3600
defidletimeout    600
definteriminterval 300

# --- MAC authentication ---
macauth

# --- Logging ---
logfacility 3
# (chilli logs to syslog local3 by default; rsyslog rule routes to /var/log/chilli.log)

# --- Misc ---
coaport 3799
nasmac
swapoctets
