# Captive Portal Gateway — kernel forwarding & conntrack tuning
net.ipv4.ip_forward=1
net.ipv4.conf.all.rp_filter=2
net.ipv4.conf.default.rp_filter=2

# IPv6 forwarding (chilli IPv6 supports later — keep ready)
net.ipv6.conf.all.forwarding=1

# Conntrack — sized for ≥100 simultaneous clients with bursty traffic
net.netfilter.nf_conntrack_max=131072
net.netfilter.nf_conntrack_tcp_timeout_established=7440

# ARP cache — bumped for many LAN clients
net.ipv4.neigh.default.gc_thresh1=1024
net.ipv4.neigh.default.gc_thresh2=2048
net.ipv4.neigh.default.gc_thresh3=4096

# Lower console kernel log level so firewall info-level logs don't spam serial
# console. Format: console_loglevel default_message_loglevel min_loglevel default
# 1 = KERN_ALERT only on console. rsyslog still routes to /var/log/firewall.log
kernel.printk = 1 4 1 7
