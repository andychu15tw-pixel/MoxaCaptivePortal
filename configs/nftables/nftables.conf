#!/usr/sbin/nft -f
# /etc/nftables.conf — Captive Portal Gateway
# Deployed by install/06-nftables.sh
#
# Rules cooperate with CoovaChilli, which already handles:
#   - DHCP / DNS hijack on tun0
#   - HTTP UAM redirect (port 80) for unauthenticated clients
#   - Per-session conntrack mark-based forwarding decisions
#
# nftables here only enforces:
#   - default-deny on FORWARD
#   - masquerade on WAN interfaces
#   - allow management traffic on the gateway itself

flush ruleset

table inet filter {

    # ----- Sets -----
    set wan_ifaces {
        type ifname
        elements = { "${WAN_IF}", "wwan0" }
    }

    set lan_ifaces {
        type ifname
        elements = { "tun0" }
    }

    # ----- INPUT -----
    chain input {
        type filter hook input priority filter; policy drop;

        # Loopback
        iif "lo" accept

        # Established / related
        ct state established,related accept
        ct state invalid drop

        # ICMP
        ip protocol icmp limit rate 50/second accept
        ip6 nexthdr icmpv6 accept

        # SSH from LAN
        iifname @lan_ifaces tcp dport 22 accept comment "ssh from LAN"

        # SSH from MGMT subnet (admin reaches box from corporate LAN over WAN)
        # MGMT_NET defaults to 0.0.0.0/0 in 06-nftables.sh (lock down via env)
        ip saddr ${MGMT_NET} tcp dport 22 accept comment "ssh from MGMT_NET"

        # Captive portal services from LAN (chilli serves DHCP/DNS/UAM internally;
        # Apache serves admin UI + cgi)
        iifname @lan_ifaces tcp dport { 80, 443, 3990 } accept comment "portal http(s) + UAM"
        iifname @lan_ifaces udp dport 53 accept comment "dns"
        iifname @lan_ifaces udp dport 67 accept comment "dhcp"

        # Admin UI (daloRADIUS) from MGMT subnet
        ip saddr ${MGMT_NET} tcp dport { 80, 443 } accept comment "admin from MGMT_NET"

        # SNMP from MGMT subnet
        ip saddr ${MGMT_NET} udp dport 161 accept comment "snmp from MGMT_NET"

        # Silently drop broadcast/multicast noise (NetBIOS, mDNS, SSDP, etc.)
        # so the firewall log does not flood console.
        pkttype { broadcast, multicast } counter drop

        # log + drop the rest (rate-limited)
        log prefix "[fw-input-drop] " level info limit rate 5/second
        counter drop
    }

    # ----- FORWARD -----
    chain forward {
        type filter hook forward priority filter; policy drop;

        # Established / related — allow return traffic
        ct state established,related accept
        ct state invalid drop

        # LAN → WAN — chilli only marks authenticated sessions for forwarding;
        # unauthenticated clients can't reach FORWARD because chilli intercepts.
        iifname @lan_ifaces oifname @wan_ifaces accept comment "lan->wan post-auth"

        # log drops for debugging
        log prefix "[fw-fwd-drop] " level info limit rate 5/second
        counter drop
    }

    # ----- OUTPUT -----
    chain output {
        type filter hook output priority filter; policy accept;
    }
}

# ----- NAT -----
table ip nat {

    set wan_ifaces {
        type ifname
        elements = { "${WAN_IF}", "wwan0" }
    }

    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;
        # Chilli handles its own DNAT for UAM redirects.
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        oifname @wan_ifaces masquerade
    }
}
