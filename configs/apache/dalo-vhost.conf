# /etc/apache2/sites-available/dalo.conf
# HTTPS vhost serving daloRADIUS + CoovaChilli HotspotLogin CGI.
#
# Single Apache instance handles both:
#   - /                 → daloRADIUS landing
#   - /daloradius/...   → daloRADIUS app
#   - /cgi-bin/...      → chilli's HotspotLogin.cgi
#   - /logo.svg, /style.css, /login.html → chilli www static assets

<VirtualHost *:80>
    ServerName moxa-cp-gw

    # Plain HTTP only used by chilli's UAM redirect (clients pre-auth can't TLS).
    # Serve the CGI + static assets here too so portal works without cert prompts.
    DocumentRoot /etc/chilli/www

    Alias /style.css   /etc/chilli/www/style.css
    Alias /logo.svg    /etc/chilli/www/logo.svg
    Alias /login.html  /etc/chilli/www/login.html

    ScriptAlias /cgi-bin/ /etc/chilli/www/
    DirectoryIndex index.php
    <Directory "/etc/chilli/www">
        Options +ExecCGI
        AddHandler cgi-script .cgi
        Require all granted
    </Directory>

    # Redirect admin paths to HTTPS
    RewriteEngine On
    RewriteRule ^/daloradius(.*)$ https://%{HTTP_HOST}/daloradius$1 [R=301,L]

    ErrorLog  ${APACHE_LOG_DIR}/dalo-error.log
    CustomLog ${APACHE_LOG_DIR}/dalo-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName moxa-cp-gw

    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/captive-portal.crt
    SSLCertificateKeyFile /etc/ssl/private/captive-portal.key
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5
    SSLHonorCipherOrder   on

    # Security headers
    Header always set Strict-Transport-Security "max-age=31536000"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # daloRADIUS — installed at /opt/daloradius (not /var/www to avoid
    # Moxa's thingspro symlink chain).
    Alias /daloradius /opt/daloradius
    DirectoryIndex login.php index.php
    <Directory /opt/daloradius>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Chilli static portal assets (HTTPS variant — for post-auth redirects)
    Alias /style.css  /etc/chilli/www/style.css
    Alias /logo.svg   /etc/chilli/www/logo.svg
    Alias /login.html /etc/chilli/www/login.html

    ScriptAlias /cgi-bin/ /etc/chilli/www/
    <Directory "/etc/chilli/www">
        Options +ExecCGI
        AddHandler cgi-script .cgi
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/dalo-error.log
    CustomLog ${APACHE_LOG_DIR}/dalo-access.log combined
</VirtualHost>
